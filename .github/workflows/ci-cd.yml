name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Cancel in-progress builds for non-main branches (allow concurrent builds only on main)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  ci:
    name: Build and Test
    uses: theandiman/recipe-management/.github/workflows/backend-java-ci.yml@973f68b323d96d59ce2ac00723f4ecc641c063f5
    permissions:
      contents: read
      actions: write
      packages: read
    with:
      version_strategy: version-script
      run_sonar: true
      sonar_project_key: theandiman_recipe-management-storage-service
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  cd:
    name: Deploy
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: theandiman/recipe-management/.github/workflows/backend-java-cloud-run-cd.yml@a8f5a790fca8ae758eb5c75115215291b77b61cc
    permissions:
      contents: write
      actions: write
    with:
      service_name: recipe-management-service
      artifact_registry_repository: recipe-management
    secrets:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_DEPLOY_SA: ${{ secrets.GCP_DEPLOY_SA }}
