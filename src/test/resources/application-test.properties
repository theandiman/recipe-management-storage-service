# Test profile configuration
# Disables authentication for integration tests

# Application
spring.application.name=recipe-storage-service-test

# Firebase Configuration (test mode)
firebase.project.id=recipe-mgmt-test

# Authentication - DISABLED for integration tests
auth.enabled=false

# Firestore Configuration
# Uses Firestore emulator or in-memory mock
firestore.collection.recipes=recipes-test
firestore.collection.users=users-test
firestore.collection.follows=follows-test

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Logging
logging.level.com.recipe.storage=DEBUG
logging.level.com.google.cloud.firestore=WARN
logging.level.io.opentelemetry=WARN

# Disable OpenTelemetry for tests
otel.sdk.disabled=true
